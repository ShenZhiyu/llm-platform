services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_platform}
      POSTGRES_USER: ${POSTGRES_USER:-llm_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llm_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-LLM Platform API}
      ENVIRONMENT: ${ENVIRONMENT:-test}
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-llm_platform}:${POSTGRES_PASSWORD:-llm_platform}@db:5432/${POSTGRES_DB:-llm_platform}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3001}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-http://192.168.10.101:8000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-dummy}
      LLM_MODEL_ID: ${LLM_MODEL_ID:-Qwen3-30B-A3B-w8a8}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_USE_MOCK_FALLBACK: ${LLM_USE_MOCK_FALLBACK:-true}
      VL_LLM_API_BASE_URL: ${VL_LLM_API_BASE_URL:-http://192.168.10.101:8003/v1}
      VL_LLM_API_KEY: ${VL_LLM_API_KEY:-dummy}
      VL_LLM_MODEL_ID: ${VL_LLM_MODEL_ID:-Qwen3-VL-8B-Instruct}
      RAG_VECTOR_STORE_DIR: /app/storage/chroma
      RAG_EMBEDDING_API_BASE_URL: ${RAG_EMBEDDING_API_BASE_URL:-http://192.168.10.101:8001/v1}
      RAG_EMBEDDING_API_KEY: ${RAG_EMBEDDING_API_KEY:-dummy}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-Qwen3-Embedding-8B}
      RAG_RERANKER_API_BASE_URL: ${RAG_RERANKER_API_BASE_URL:-http://192.168.10.101:8002/v1}
      RAG_RERANKER_API_KEY: ${RAG_RERANKER_API_KEY:-dummy}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-Qwen3-Reranker-8B}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "${WEB_PORT:-3001}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:

